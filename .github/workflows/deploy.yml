name: Deploy static site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # permet le déclenchement manuel

# Permissions minimales nécessaires pour le déploiement Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Évite les déploiements concurrents, sans annuler celui en cours
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # uploade tout le repo tel quel

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4